name: CI

# Every PR and push to main must prove the transformation layer is sound
# before it can merge/deploy: dbt models build against the live warehouse
# and the Great Expectations release gate must stay open.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SNOWFLAKE_ACCOUNT: QRFICHI-TQ35414
      SNOWFLAKE_USER: PIPELINE_SVC
      # literal path: the runner context is not available in job-level env
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/sf_key.p8

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Materialize Snowflake key
        run: |
          printf '%s' "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > "$SNOWFLAKE_PRIVATE_KEY_PATH"
          chmod 600 "$SNOWFLAKE_PRIVATE_KEY_PATH"

      - name: dbt deps
        working-directory: dbt_project
        run: uv run dbt deps --profiles-dir .

      - name: dbt build (models + tests)
        working-directory: dbt_project
        run: uv run dbt build --profiles-dir .

      - name: Great Expectations release gate
        run: uv run python quality/run_checkpoint.py
