name: airline_otp
version: "1.0.0"
profile: airline_otp

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: target
clean-targets: [target, dbt_packages]

models:
  airline_otp:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      # Inlined as CTEs into downstream models — no warehouse object needed.
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts

seeds:
  airline_otp:
    +schema: seeds
    carriers:
      +column_types:
        carrier_code: varchar(4)
    cancellation_codes:
      +column_types:
        cancellation_code: varchar(1)
