# Connection profile — no secrets live in this file.
# Non-sensitive defaults are inlined; the private key stays on disk outside
# the repo and everything can be overridden via environment variables
# (which is how CI and Airflow will authenticate).
airline_otp:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', 'QRFICHI-TQ35414') }}"
      user: "{{ env_var('SNOWFLAKE_USER', 'PIPELINE_SVC') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH', env_var('HOME') ~ '/.snowflake/keys/pipeline_svc_rsa.p8') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'TRANSFORMER') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'TRANSFORM_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'AIRLINE_OTP') }}"
      schema: analytics
      threads: 8
